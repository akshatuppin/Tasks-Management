<!-- <app-header></app-header> -->
<!-- the upper lne can be written like this  -->
<app-header />
<main>
    <ul id="user">
       @for(user of users; track user.id){
        <li>
            <!-- Same for app-user also  -->
            <app-user [user]="user" [selected]="user.id === selectedUserId" (select)="onSelectedUser($event)" />
        </li>
       }
    </ul>


    @if (selectedUser){
        <app-tasks [userId]="selectedUser.id"  [name]="selectedUser.name"/>
    } @else{
          <p id="fallback">Select a user to see their tasks!</p>
    }
    
</main>
