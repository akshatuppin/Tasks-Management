<app-cards>
    <article>
        <h2>{{ task.title }}</h2>
        <time datetime=""> {{ task.dueDate | date: 'fullDate'}}</time>
        <p> {{task.summary}} </p>
        <p>Summary</p>
        <p class="actions">
            <button (click)="onCompleteTask()">Compete</button>
        </p>

    </article>
</app-cards>
